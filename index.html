<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画角再現システム - かんたん自動版</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            box-sizing: border-box;
        }
        .container {
            position: relative;
            width: 90%;
            max-width: 640px;
        }
        video { display: none; }
        canvas {
            width: 100%;
            height: auto;
            border: 2px solid #555;
            border-radius: 8px;
            display: block;
            transition: border-color 0.3s;
        }
        canvas.locked {
            border-color: #34c759;
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.5);
        }
        canvas.error {
            border-color: #ff3b30;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.5);
        }
        #canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.4; /* お手本の薄さ */
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            width: 90%;
            max-width: 640px;
            margin: 15px 0;
        }
        #start-btn { background-color: #007aff; }
        #start-btn:disabled { background-color: #555; cursor: not-allowed; }
        #shoot-btn { background-color: #34c759; display: none; animation: pulse 1.5s infinite; }
        #shoot-btn:active { transform: scale(0.98); }
        
        #status {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            min-height: 48px;
            padding: 0 10px;
            line-height: 1.4;
        }
        
        /* リセットボタン用の控えめなスタイル */
        .reset-container {
            margin-top: 30px;
            width: 100%;
            text-align: center;
        }
        .btn-reset {
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
        }
        .btn-reset:hover {
            color: #ff3b30;
            border-color: #ff3b30;
        }

        #camera-trigger { display: none; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
    </style>
    <script async src="https://docs.opencv.org/4.x/opencv.js" id="opencv-src"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
        <canvas id="canvas-overlay"></canvas>
    </div>

    <button id="start-btn" class="btn" disabled>システム開始</button>
    <button id="shoot-btn" class="btn">📸 画角OK！撮影開始（0.5倍へ）</button>

    <input type="file" id="camera-trigger" accept="image/*" capture="environment">

    <!-- 隠されたリセットエリア -->
    <div class="reset-container">
        <button id="reset-btn" class="btn-reset">🔄 画角データをリセットする</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('canvas-output');
        const ctx = canvas.getContext('2d');
        const canvasOverlay = document.getElementById('canvas-overlay');
        const ctxOverlay = canvasOverlay.getContext('2d');

        const startBtn = document.getElementById('start-btn');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status');
        const cameraTrigger = document.getElementById('camera-trigger');
        const resetBtn = document.getElementById('reset-btn');

        let src, dst, hsv, mask, contours, hierarchy;
        let isProcessing = false;
        
        let lockCounter = 0;
        const REQUIRED_FRAMES = 90; // 3秒の安定性
        const ALLOWED_ERROR = 20;    // 許容するズレ（ピクセル単位）

        let currentDetectedPoints = null; 
        let savedAngleData = null;       
        let isFirstDayMode = true;       // 初日モードかどうかのフラグ

        // 起動時にデータを自動確認
        window.addEventListener('DOMContentLoaded', () => {
            const localData = localStorage.getItem('robot_cooking_angle_data');
            if (localData) {
                savedAngleData = JSON.parse(localData);
                isFirstDayMode = false;
                console.log("既存の基準データを読み込みました");
            }
        });

        document.getElementById('opencv-src').addEventListener('load', () => {
            if (isFirstDayMode) {
                statusText.innerHTML = "準備完了！ボタンを押して開始してください<br><span style='color:#ff9500; font-size:13px;'>※初日：ベストな画角に合わせると自動で記憶されます</span>";
            } else {
                statusText.innerHTML = "準備完了！ボタンを押して開始してください<br><span style='color:#007aff; font-size:13px;'>※2日目以降：前日の影に合わせてください</span>";
            }
            startBtn.disabled = false;
        });

        startBtn.addEventListener('click', async () => {
            statusText.innerText = "カメラを起動中...";
            try {
                const initStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                initStream.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                let targetDeviceId = null;

                const wideDevice = videoDevices.find(d => {
                    const label = d.label.toLowerCase();
                    return label.includes('ultra') || label.includes('wide') || label.includes('0.5') || label.includes('超広角');
                });

                if (wideDevice) { targetDeviceId = wideDevice.deviceId; } 
                else if (videoDevices.length > 1) { targetDeviceId = videoDevices[videoDevices.length - 1].deviceId; }

                const constraints = { audio: false, video: { width: { ideal: 640 }, height: { ideal: 480 } } };
                if (targetDeviceId) { constraints.video.deviceId = { exact: targetDeviceId }; } 
                else { constraints.video.facingMode = 'environment'; }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
                
                if (capabilities.zoom) {
                    try { await videoTrack.applyConstraints({ advanced: [{ zoom: capabilities.zoom.min }] }); } catch (e) {}
                }

                video.srcObject = stream;
                video.play();
                startBtn.style.display = 'none';
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvasOverlay.width = video.videoWidth;
                    canvasOverlay.height = video.videoHeight;
                    
                    // 2日目以降ならお手本を重ねて描画
                    if (!isFirstDayMode && savedAngleData && savedAngleData.image) {
                        const img = new Image();
                        img.onload = () => { ctxOverlay.drawImage(img, 0, 0, canvasOverlay.width, canvasOverlay.height); };
                        img.src = savedAngleData.image;
                    }

                    src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                    hsv = new cv.Mat(); mask = new cv.Mat(); contours = new cv.MatVector(); hierarchy = new cv.Mat();

                    isProcessing = true;
                    requestAnimationFrame(processVideo);
                };
            } catch (error) { statusText.innerText = "カメラ起動失敗: " + error.message; }
        });

        // 🔄 データリセットボタンが押されたとき
        resetBtn.addEventListener('click', () => {
            if (confirm("保存されている画角データを削除しますか？\n（新しい画角で初日からやり直したい場合のみ行ってください）")) {
                localStorage.removeItem('robot_cooking_angle_data');
                alert("データをリセットしました。ページを再読み込みします。");
                location.reload();
            }
        });

        // 自動バックアップDL関数
        function autoExportJSON(data) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `angle_backup_data.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        shootBtn.addEventListener('click', () => {
            // 【初日の場合のみ】撮影開始ボタンが押された瞬間に、裏で自動的に基準として保存＆JSONを自動DLさせる
            if (isFirstDayMode && currentDetectedPoints) {
                const imageDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                savedAngleData = {
                    timestamp: new Date().toISOString(),
                    points: currentDetectedPoints,
                    image: imageDataUrl
                };
                localStorage.setItem('robot_cooking_angle_data', JSON.stringify(savedAngleData));
                autoExportJSON(savedAngleData); // 裏で自動ダウンロード
                isFirstDayMode = false;
            }

            isProcessing = false;
            cameraTrigger.click();
        });

        cameraTrigger.addEventListener('change', (e) => {
            lockCounter = 0;
            shootBtn.style.display = 'none';
            canvas.classList.remove('locked');
            canvas.classList.remove('error');
            isProcessing = true;
            statusText.innerHTML = "撮影完了しました。次の準備をしてください。";
            requestAnimationFrame(processVideo);
        });

        function processVideo() {
            if (!isProcessing) return;

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            src.data.set(ctx.getImageData(0, 0, canvas.width, canvas.height).data);

            cv.GaussianBlur(src, dst, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
            cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

            let low = cv.matFromArray(3, 1, cv.CV_8U, [35, 80, 60]);
            let high = cv.matFromArray(3, 1, cv.CV_8U, [85, 255, 255]);
            cv.inRange(hsv, low, high, mask); low.delete(); high.delete();

            cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let validCenters = [];
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);
                if (area > 50 && perimeter > 0) {
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                    if (circularity > 0.55) { 
                        let M = cv.moments(cnt);
                        if (M.m00 !== 0) { validCenters.push({ x: M.m10 / M.m00, y: M.m01 / M.m00 }); }
                    }
                }
                cnt.delete();
            }

            if (validCenters.length === 4) {
                validCenters.sort((a, b) => a.y - b.y);
                let topTwo = [validCenters[0], validCenters[1]].sort((a, b) => a.x - b.x);
                let bottomTwo = [validCenters[2], validCenters[3]].sort((a, b) => a.x - b.x);
                currentDetectedPoints = [topTwo[0], topTwo[1], bottomTwo[1], bottomTwo[0]];

                // 2日目以降の自動画角チェック
                let isAnglePerfect = true;
                if (!isFirstDayMode && savedAngleData) {
                    for (let i = 0; i < 4; i++) {
                        let dx = currentDetectedPoints[i].x - savedAngleData.points[i].x;
                        let dy = currentDetectedPoints[i].y - savedAngleData.points[i].y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > ALLOWED_ERROR) { isAnglePerfect = false; break; }
                    }
                }

                if (isAnglePerfect) {
                    lockCounter++;
                    ctx.strokeStyle = '#34c759'; // 画角が合っていれば緑枠
                    canvas.classList.remove('error');
                    
                    if (lockCounter >= REQUIRED_FRAMES) {
                        canvas.classList.add('locked');
                        shootBtn.style.display = 'block';
                        if (isFirstDayMode) {
                            statusText.innerHTML = "<span style='color: #34c759;'>🟢 画角が安定しました。撮影ボタンを押すとこの画角を自動記憶します。</span>";
                        } else {
                            statusText.innerHTML = "<span style='color: #34c759;'>🟢 前日と画角が一致しました！撮影ボタンを押してください。</span>";
                        }
                    } else { statusText.innerHTML = `🟡 位置を確認中...`; }
                } else {
                    // 画角がズレている場合
                    lockCounter = 0;
                    ctx.strokeStyle = '#ff3b30'; // ズレていたら赤枠
                    canvas.classList.remove('locked');
                    canvas.classList.add('error');
                    shootBtn.style.display = 'none';
                    statusText.innerHTML = "<span style='color: #ff3b30;'>⚠️ 前日と三脚の位置がズレています！<br>半透明の影にピタッと重なるように直してください。</span>";
                }

                // 枠線の描画
                ctx.lineWidth = 5; ctx.beginPath();
                ctx.moveTo(currentDetectedPoints[0].x, currentDetectedPoints[0].y);
                ctx.lineTo(currentDetectedPoints[1].x, currentDetectedPoints[1].y);
                ctx.lineTo(currentDetectedPoints[2].x, currentDetectedPoints[2].y);
                ctx.lineTo(currentDetectedPoints[3].x, currentDetectedPoints[3].y);
                ctx.closePath(); ctx.stroke();

            } else {
                lockCounter = 0;
                shootBtn.style.display = 'none';
                canvas.classList.remove('locked');
                canvas.classList.remove('error');
                statusText.innerHTML = `🔍 マーカーを探しています... (${validCenters.length} / 4)`;
            }

            requestAnimationFrame(processVideo);
        }
    </script>
</body>
</html>
